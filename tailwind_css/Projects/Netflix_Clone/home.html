<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix</title>
    <!-- Tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- banner section start -->
     <section class="w-full min-h-screen bg-[url('./images/header-img.jpg')] bg-center bg-cover">
        <div class="w-full min-h-screen bg-[rgba(0,0,0,0.5)]">
            <header class="max-w-[1170px] mx-auto">
                <div class="grid sm:grid-cols-2 grid-cols-[30%_auto] px-5 items-center">
                    <figure>
                        <img src="./images/logo.png" alt="Netflix Logo" class="w-[200px]">
                    </figure>
                    <div class="flex justify-end pr-0 gap-3 sm:gap-6">
                        <div>
                            <select name="" id="" class="bg-black text-white rounded-[5px] border-[1px] border-[white] text-xs sm:text-sm px-2 py-1 sm:px-4 sm:py-2">
                                <option value="">English</option>
                                <option value="">Hindi</option>
                            </select>
                        </div>
                        <button class="bg-red-600 text-white text-xs sm:text-sm px-2 py-1 sm:px-4 sm:py-2 rounded">Sign In</button>
                    </div>
                </div>
            </header>
        </div>
     </section>
    <!-- banner section end -->
  </body>
</html>
