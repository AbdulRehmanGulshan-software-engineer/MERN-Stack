<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar</title>
    <!-- Tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome library -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body class="bg-[url(../Netflix_Clone/images/header-img.jpg)] bg-cover bg-center h-screen">
        <header class="bg-[black]/80 text-[white] font-bold sm:rounded-4xl max-w-[1200px] mx-auto mt-[20px]">
            <nav class="flex items-center justify-between sm:px-[40px] px-[15px] sm:h-[60px] h-[45px]">
                <a href="" class="sm:text-@xl">Tailwind Anytime</a>
                <div class="dropdownMenu absolute sm:static -top-full sm:bg-transparent bg-[#00000095] w-full sm:w-auto left-0 flex flex-col sm:flex-row  gap-6 sm:gap-8 sm:items-center sm:justify-between">
                <ul class="flex flex-col sm:flex-row gap-6 items-center">
                    <li class="hover:text-red-500 duration-300">Home</li>
                    <li class="hover:text-red-500 duration-300">Services</li>
                    <li class="hover:text-red-500 duration-300">Products</li>
                    <li class="hover:text-red-500 duration-300">Blogs</li>
                    <li class="hover:text-red-500 duration-300">Courses</li>
                </ul>
                <div class="flex flex-col sm:flex-row gap-6 items-center">
                    <button class="bg-red-500 rounded-lg px-4 py-1 hover:bg-red-400 duration-300">Log In</button>
                    <button class="bg-red-500 rounded-lg px-4 py-1 hover:bg-red-400 duration-300">Sign Up</button>
                </div>
            </div>
            <div class="toggleButton"><i class="fa-solid fa-bars sm:text-2xl"></i></div>
        </nav>
    </header>
</body>
<script src="./script.js"></script>
</html>
