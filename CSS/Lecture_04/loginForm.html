<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="./loginForm.css">
</head>
<body>
    <div class="loginForm">
        <form>
            <h1>Login</h1>
            
            <div class="usp">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" style="display: block;">
            </div>
            <div class="usp">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" style="display: block;">
            </div>

            <button style="width: 100px ;height: 40px; margin: 20px; text-align: center">
                Login
            </button>

        </form>
    </div>
</body>
</html>
